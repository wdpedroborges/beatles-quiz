<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Beatles Quiz</title>
	<link rel="stylesheet" type="text/css" href="styles.css">
	<script type="text/javascript" src="script.js" defer></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
</head>
<style type="text/css">
	audio {
		display: none;
	}
</style>
<body>

<div id="toast"></div>

<h1>Beatles Quiz</h1>
<div id="quiz">
	
	<button id="btnDuracao">+</button>
	<button id="btnPlay"><i class="bi bi-play-fill"></i></button>
	<div id="musica"></div>
	<p id="resposta"></p>
	<p id="dicas"></p>
	<div id="botoes">
		<button id="btnRevelarResposta">Revelar resposta</button>
		<button id="btnDica">Dica textual</button>
		<button id="btnNovoTrecho">Novo trecho</button>
		<button id="btnProxima"><i class="bi bi-arrow-right"></i></button>
	</div>
</div>

<div id="infoDicas"></div>

<template id="templateAudio">
	<audio controls>
		<source src="yesterday.mp3" type="audio/mpeg">
		Seu navegador não suporta arquivos de áudio.
	</audio>
</template>
</body>
</html>
