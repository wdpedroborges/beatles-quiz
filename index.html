	audio {
		display: none;
	}
</style>
<body>

<div id="toast"></div>

<h1>Beatles Quiz</h1>
<div id="quiz">
	<button id="btnPlay"><i class="bi bi-play-fill"></i></button>
	<div id="musica"></div>
	<p id="resposta"></p>
	<ul id="dicas"></ul>
	<div id="botoes">
		<button id="btnRevelarResposta">Revelar resposta</button>
		<button id="btnDica">Dica textual</button>
		<button id="btnNovoTrecho">Novo trecho</button>
		<button id="btnDuracao">Mais tempo</button>
		<button id="btnProxima"><i class="bi bi-arrow-right"></i></button>
	</div>
</div>

<div id="infoDicas"></div>

<template id="templateAudio">
	<audio controls>
		<source src="yesterday.mp3" type="audio/mpeg">
		Seu navegador não suporta arquivos de áudio.
	</audio>
</template>
